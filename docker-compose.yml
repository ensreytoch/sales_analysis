version: "3.8"

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sundery_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin
      POSTGRES_DB: sundery_sales
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Flyway Migrations ─────────────────────────────────────────────────────
  flyway:
    image: flyway/flyway:10-alpine
    container_name: sundery_flyway
    command: >
      -url=jdbc:postgresql://db:5432/sundery_sales
      -user=postgres
      -password=Admin
      -connectRetries=10
      migrate
    volumes:
      - ./backend/db/migrations:/flyway/sql
    depends_on:
      db:
        condition: service_healthy

  # ─── Express Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sundery_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: Admin
      DB_NAME: sundery_sales
      CORS_ORIGIN: "*"
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  # ─── React Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sundery_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
